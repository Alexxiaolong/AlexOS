services:
  - type: web
    name: alexos-whatsapp
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5-mini
      - key: META_ACCESS_TOKEN
        sync: false
      - key: META_PHONE_NUMBER_ID
        sync: false
      - key: META_VERIFY_TOKEN
        sync: false
      - key: OWNER_PHONE_NUMBER
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: alexos-db
          property: connectionString

databases:
  - name: alexos-db
    plan: basic-256mb
